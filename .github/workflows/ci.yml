# ─────────────────────────────────────────────────────────────────────────
# WHAT  : CI — static checks for every PR and push to main.
# WHERE : .github/workflows/ci.yml
# WHY   : catch broken templates / scripts before they land in someone's
#         $HOME. Jobs are intentionally cheap so the pipeline is fast.
# ─────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shell scripts ─────────────────────────────────────────────────────
  shell:
    name: shellcheck + shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x scripts/bootstrap-mac.sh scripts/bootstrap-linux.sh scripts/common/lib.sh

      - name: shfmt (diff)
        uses: mfinelli/setup-shfmt@v3

      - name: shfmt check
        run: shfmt -d -i 4 scripts/bootstrap-mac.sh scripts/bootstrap-linux.sh scripts/common/lib.sh

  # ── PowerShell ────────────────────────────────────────────────────────
  powershell:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path scripts/bootstrap-windows.ps1 -Severity Error,Warning
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer reported $($results.Count) issue(s)."
          }
          else {
              Write-Host "PSScriptAnalyzer: clean."
          }

  # ── Lua (neovim + wezterm) ────────────────────────────────────────────
  lua:
    name: luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: luacheck
        run: luacheck home/dot_config/nvim/lua home/dot_config/wezterm

  # ── actionlint: own workflow YAML stays healthy ───────────────────────
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  # ── neovim headless smoke: lazy.nvim installs, no startup errors ──────
  # Ubuntu ships an old nvim; LazyVim requires 0.10+. Pull the upstream
  # AppImage-extracted binary instead.
  nvim:
    name: neovim headless
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install neovim (upstream stable)
        run: |
          curl -fsSL -o /tmp/nvim.tar.gz \
            https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          mkdir -p "$HOME/.local/nvim"
          tar -xzf /tmp/nvim.tar.gz -C "$HOME/.local/nvim" --strip-components=1
          echo "$HOME/.local/nvim/bin" >> "$GITHUB_PATH"

      - name: Link nvim config
        run: |
          mkdir -p "$HOME/.config"
          ln -s "$PWD/home/dot_config/nvim" "$HOME/.config/nvim"

      - name: Install plugins (Lazy! sync)
        run: |
          # First run bootstraps lazy.nvim + clones/builds all plugins.
          # Treesitter parsers compile here — stderr noise is expected,
          # so we only enforce a non-zero exit code.
          nvim --headless "+Lazy! sync" +qa

      - name: Startup smoke (clean load after sync)
        run: |
          # Second run: config should load silently. Any stderr output now
          # means a Lua error that slipped past plugin install.
          nvim --headless +qa 2> /tmp/nvim.err
          if [ -s /tmp/nvim.err ]; then
              echo "::error::nvim wrote to stderr on clean startup:"
              cat /tmp/nvim.err
              exit 1
          fi
          echo "neovim headless smoke: OK"

  # ── chezmoi: templates render for every profile ───────────────────────
  chezmoi:
    name: chezmoi dry-run (all profiles)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, safran, geneva, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: chezmoi init
        run: |
          $HOME/.local/bin/chezmoi init --source="$PWD/home" --no-tty \
            --promptString "Email address=ci@ci.test" \
            --promptString "Full name=CI Bot" \
            --promptChoice "Machine profile=${{ matrix.profile }}" \
            --promptString "HTTP proxy URL (blank if none)=http://proxy.ci:8080" \
            --promptString "HTTPS proxy URL (blank if none)=http://proxy.ci:8080"

      - name: chezmoi apply --dry-run
        run: $HOME/.local/bin/chezmoi apply --source="$PWD/home" --dry-run --verbose

      - name: Validate rendered settings.json is valid JSON
        run: |
          $HOME/.local/bin/chezmoi cat --source="$PWD/home" \
            "$HOME/.claude/settings.json" > /tmp/settings.json
          python3 -c "import json; json.load(open('/tmp/settings.json')); print('settings.json OK for ${{ matrix.profile }}')"

      - name: Validate rendered .gitconfig parses
        run: |
          $HOME/.local/bin/chezmoi cat --source="$PWD/home" \
            "$HOME/.gitconfig" > /tmp/gitconfig
          git config --file /tmp/gitconfig --list > /dev/null
          echo ".gitconfig OK for ${{ matrix.profile }}"
