name: CI

on:
  push: { branches: [main] }
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck + shfmt
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck shfmt
          shellcheck scripts/*.sh home/dot_local/bin/executable_dotfiles-*
          shfmt -d -i 4 scripts/*.sh home/dot_local/bin/executable_dotfiles-*

      - name: powershell parse
        shell: pwsh
        run: |
          $files = @('scripts/install.ps1','scripts/uninstall-windows.ps1',
                     'home/dot_local/bin/dotfiles-update.ps1',
                     'home/dot_local/bin/dotfiles-doctor.ps1')
          foreach ($f in $files) {
              $null = [scriptblock]::Create((Get-Content -Raw $f))
              Write-Host "OK: $f"
          }

      - name: chezmoi apply --dry-run
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          "$HOME/.local/bin/chezmoi" init --source="$PWD/home" --no-tty \
            --promptString "Email address=ci@ci.test" \
            --promptString "Full name=CI Bot" \
            --promptString "HTTP proxy URL (blank if none)=" \
            --promptString "HTTPS proxy URL (blank if none)="
          "$HOME/.local/bin/chezmoi" apply --source="$PWD/home" --dry-run --verbose
          "$HOME/.local/bin/chezmoi" cat --source="$PWD/home" "$HOME/.claude/settings.json" \
            | python3 -c "import json,sys; json.load(sys.stdin)"
          "$HOME/.local/bin/chezmoi" cat --source="$PWD/home" "$HOME/.gitconfig" \
            | git config --file /dev/stdin --list >/dev/null
