# ─────────────────────────────────────────────────────────────────────────
# Example .sops.yaml — copy to the ROOT of any repo where you want SOPS to
# auto-encrypt secret files. Replace the placeholder with the public key
# printed by `dotfiles-keygen-age`.
#
# Usage in the target repo:
#   1. Copy this file to <repo>/.sops.yaml and edit the recipients.
#   2. Create your secret as plaintext: e.g. config/secrets.yaml
#   3. Encrypt in place:   sops -e -i config/secrets.enc.yaml
#      (or just `sops config/secrets.enc.yaml` to edit transparently)
#   4. Commit the .enc file. Decryption is automatic for any user whose
#      age key is in the recipient list.
#
# To rotate: edit creation_rules + run `sops updatekeys file.enc.yaml`
# for every encrypted file in the repo.
# ─────────────────────────────────────────────────────────────────────────

creation_rules:
    # Encrypt anything matching *.enc.yaml / *.enc.yml / *.enc.json under the
    # repo. The path_regex is anchored to the repo root by SOPS.
    - path_regex: \.enc\.ya?ml$
      age: >-
          age1XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

    - path_regex: \.enc\.json$
      age: >-
          age1XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX

    # Multiple recipients = multiple decryption keys. Add a teammate's
    # public key here, run `sops updatekeys <file>` and the file becomes
    # decryptable by both. Do NOT remove your own key in the same edit.
    #
    # Per-environment overlays are common — restrict prod recipients to a
    # smaller subset:
    # - path_regex: env/prod/.*\.enc\.ya?ml$
    #   age: >-
    #       age1PROD_KEY,age1OPS_KEY
