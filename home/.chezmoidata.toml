# Stack KISS — installé par run_onchange_10 selon l'OS détecté.
# Outils hors PM (claude, omp) gérés directement par l'install hook.

[packages]
arch = [
    "zsh", "git", "curl", "base-devel", "unzip",
    "wezterm", "neovim", "lazygit", "starship",
    "zoxide", "eza", "fzf", "ripgrep", "fd", "bat", "git-delta",
    "github-cli", "jq", "yq",
    "ttf-jetbrains-mono-nerd",
    "zsh-autosuggestions", "zsh-syntax-highlighting",
    "xclip", "wl-clipboard",
]

ubuntu = [
    "zsh", "git", "curl", "ca-certificates", "build-essential", "unzip",
    "neovim", "fzf", "ripgrep", "fd-find", "bat",
    "jq", "zoxide",
    "zsh-autosuggestions", "zsh-syntax-highlighting",
    "xclip", "wl-clipboard",
]

# WezTerm, lazygit, eza, starship, delta, gh n'ont pas de package apt fiable
# sur les LTS récentes — installés via leur installeur officiel par le hook.
windows = [
    "git", "wezterm", "neovim", "lazygit", "starship",
    "zoxide", "eza", "fzf", "ripgrep", "fd", "bat", "delta",
    "gh", "jq", "yq",
    "JetBrainsMono-NF",
]
